<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Sudoku Verseny</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

h1 {
    margin-top: 20px;
}

/* =========================
   FELÜL NÉV + OSZTÁLY
========================= */
.section {
    margin: 20px;
    padding: 15px;
    background: white;
    border-radius: 10px;
}

.section input {
    width: 240px;
    height: 36px;
    font-size: 16px;
    padding: 5px 10px;
    margin: 5px;
}

/* =========================
   SUDOKU TÁBLA
========================= */
table {
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
}

/* cellák */
td {
    border: 1px solid #333;
    width: 38px;
    height: 38px;
    padding: 0;
}

/* sudoku input */
table input {
    width: 36px;
    height: 36px;
    text-align: center;
    font-size: 18px;
    border: none;
    outline: none;
}

/* helyes / hibás */
input.correct {
    background: #b6fcb6;
}

input.wrong {
    background: #ffb3b3;
}

/* =========================
   3x3 BLOKK VASTAG VONALAK
========================= */
td:nth-child(3n) {
    border-right: 3px solid #000;
}

tr:nth-child(3n) td {
    border-bottom: 3px solid #000;
}

table tr:first-child td {
    border-top: 3px solid #000;
}

table td:first-child {
    border-left: 3px solid #000;
}

/* halvány csíkozás */
tr:nth-child(odd) td:nth-child(even),
tr:nth-child(even) td:nth-child(odd) {
    background: #f2f2f2;
}
</style>
</head>

<body>

<h1>Sudoku Verseny</h1>

<!-- név + osztály -->
<div class="section">
    <input id="name" placeholder="Név">
    <input id="className" placeholder="Osztály">
</div>

<!-- sudoku -->
<div id="puzzles"></div>

<button onclick="checkAll()">Beküldés</button>

<h2 id="result"></h2>

<h2>Ranglista</h2>
<div id="leaderboard"></div>

<!-- Sudoku adatok -->
<script src="sudoku.js"></script>
