<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Sudoku Verseny</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

h1 { margin-top: 20px; }

table {
    margin: 20px auto;
    border-collapse: collapse;
}

td {
    border: 1px solid #333;
    width: 35px;
    height: 35px;
}

input {
    width: 32px;
    height: 32px;
    text-align: center;
    font-size: 18px;
    border: none;
}

input.correct {
    background: lightgreen;
}

input.wrong {
    background: lightcoral;
}

.section {
    margin: 20px;
    padding: 15px;
    background: white;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Sudoku Verseny</h1>

<div class="section">
    <input id="name" placeholder="Név">
    <input id="class" placeholder="Osztály">
</div>

<div id="puzzles"></div>

<button onclick="checkAll()">Beküldés</button>

<h2 id="result"></h2>

<script src="sudoku.js"></script>
<script src="script.js"></script>

</body>
</html>
