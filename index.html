<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Sudoku Verseny</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

h1 {
    margin-top: 20px;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
}

td {
    border: 1px solid #333;
    width: 38px;
    height: 38px;
    padding: 0;
}

input {
    width: 160px;
    height: 36px;
    text-align: center;
    font-size: 18px;
    border: none;
    outline: none;
}

input.correct {
    background: #b6fcb6;
}

input.wrong {
    background: #ffb3b3;
}

/* 3x3 vastag vonalak */
td:nth-child(3n) {
    border-right: 3px solid #000;
}

tr:nth-child(3n) td {
    border-bottom: 3px solid #000;
}

table tr:first-child td {
    border-top: 3px solid #000;
}

table td:first-child {
    border-left: 3px solid #000;
}

/* csíkozás */
tr:nth-child(odd) td:nth-child(even),
tr:nth-child(even) td:nth-child(odd) {
    background: #f2f2f2;
}

.section {
    margin: 20px;
    padding: 15px;
    background: white;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Sudoku Verseny</h1>

<div class="section">
    <input id="name" placeholder="Név">
    <input id="className" placeholder="Osztály">
</div>

<div id="puzzles"></div>

<button onclick="checkAll()">Beküldés</button>

<h2 id="result"></h2>

<h2>Ranglista</h2>
<div id="leaderboard"></div>

<!-- Sudoku adatok -->
<script src="sudoku.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    storageBucket: "sudoku-verseny.firebasestorage.app",
    messagingSenderId: "156616295399",

  // globális DB
  window.db = firebase.firestore();
</script>

<!-- fő script -->
<script src="script.js"></script>

</body>
</html>
