<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Verseny</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
    margin: 0;
}

h1 { margin-top: 15px; }

/* ===================== TIMER ===================== */
#timer {
    font-size: 22px;
    font-weight: bold;
    margin: 10px;
}

/* ===================== INPUT ===================== */
.section {
    margin: 10px auto;
    padding: 10px;
    background: white;
    display: inline-block;
    border-radius: 10px;
}

.section input {
    width: 250px;
    height: 40px;
    font-size: 16px;
    margin: 5px;
}

/* ===================== GOMBOK ===================== */
.top-buttons,
.bottom-buttons {
    margin: 15px;
}

button {
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
}

/* ===================== PUZZLE ===================== */
.puzzle-wrapper {
    margin: 20px auto;
    padding: 15px;
    background: white;
    border-radius: 10px;
    width: fit-content;
}

/* ===== SUDOKU TÁBLA ===== */
table {
    border-collapse: collapse;
    margin: auto;
    border: 3px solid #000; /* külső keret */
}

/* alap cella */
td {
    width: 40px;
    height: 40px;
    border: 1px solid #aaa;
    padding: 0;
}

/* input */
input {
    width: 38px;
    height: 38px;
    text-align: center;
    font-size: 18px;
    border: none;
    outline: none;
}

/* fix számok */
input:disabled {
    background: #eee;
    font-weight: bold;
}

/* ===================== 3x3 BLOKK VASTAGÍTÁS ===================== */

/* függőleges vastag vonalak */
td:nth-child(3n) {
    border-right: 3px solid #000;
}

/* vízszintes vastag vonalak */
tr:nth-child(3n) td {
    border-bottom: 3px solid #000;
}

/* felső + bal keret erősítése */
tr:first-child td {
    border-top: 3px solid #000;
}

td:first-child {
    border-left: 3px solid #000;
}

/* ===================== HALVÁNY CSÍKOZÁS ===================== */
tr:nth-child(odd) td:nth-child(even),
tr:nth-child(even) td:nth-child(odd) {
    background: #f6f6f6;
}

/* ===================== MOBIL ===================== */
@media (max-width: 600px) {
    td { width: 34px; height: 34px; }
    input { width: 32px; height: 32px; font-size: 16px; }
}
</style>
</head>

<body>

<h1>Sudoku Verseny</h1>

<div id="timer">⏱ 00:00</div>

<div class="section">
    <input id="name" placeholder="Név">
    <input id="className" placeholder="Osztály">
</div>

<div class="top-buttons">
    <button onclick="startGame()">Verseny indítása</button>
</div>

<div id="puzzles"></div>

<div class="bottom-buttons">
    <button onclick="checkAll()">Beküldés</button>
</div>

<h2 id="result"></h2>

<script src="sudoku.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyBDcvw4MQww65S...",
    authDomain: "sudoku-verseny.firebaseapp.com",
    projectId: "sudoku-verseny"
});

window.db = firebase.firestore();
</script>

<script src="script.js"></script>

</body>
</html>
