<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Verseny</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
    margin: 0;
}

h1 { margin-top: 15px; }

.section {
    margin: 10px auto;
    padding: 10px;
    background: white;
    display: inline-block;
    border-radius: 10px;
}

.section input {
    width: 260px;
    height: 40px;
    font-size: 16px;
    margin: 5px;
    padding: 5px;
    box-sizing: border-box;
}

/* ===== Sudoku blokkok ===== */
.puzzle-wrapper {
    margin: 25px auto;
    padding: 15px;
    background: white;
    border-radius: 12px;
    width: fit-content;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.puzzle-title {
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 18px;
}

/* ===== tábla ===== */
table {
    border-collapse: collapse;
    margin: auto;
}

td {
    width: 38px;
    height: 38px;
    border: 1px solid #ccc;
}

input {
    width: 36px;
    height: 36px;
    text-align: center;
    font-size: 18px;
    border: none;
    outline: none;
    background: #fafafa;
}

input:focus {
    background: #e6f2ff;
}

/* 3x3 vastag vonalak */
td:nth-child(3n) { border-right: 2px solid #000; }
tr:nth-child(3n) td { border-bottom: 2px solid #000; }

/* ===== gomb ===== */
button {
    margin: 20px;
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Sudoku Verseny</h1>

<div class="section">
    <input id="name" placeholder="Név">
    <input id="className" placeholder="Osztály">
</div>

<div id="puzzles"></div>

<button onclick="checkAll()">Beküldés</button>

<h2 id="result"></h2>

<script src="sudoku.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBDcvw4MQww65S...",
    authDomain: "sudoku-verseny.firebaseapp.com",
    projectId: "sudoku-verseny"
};

firebase.initializeApp(firebaseConfig);
window.db = firebase.firestore();
</script>

<script src="script.js"></script>

</body>
</html>
