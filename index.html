<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Verseny</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
    margin: 0;
}

h1 { margin-top: 15px; }

/* ===== IDŐ ===== */
#timer {
    font-size: 22px;
    font-weight: bold;
    margin: 10px;
}

/* ===== FELSŐ INPUT ===== */
.section {
    margin: 10px auto;
    padding: 10px;
    background: white;
    display: inline-block;
    border-radius: 10px;
}

.section input {
    width: 250px;
    height: 40px;
    font-size: 16px;
    margin: 5px;
}

/* ===== PUZZLE ===== */
.puzzle-wrapper {
    margin: 20px auto;
    padding: 15px;
    background: white;
    border-radius: 10px;
    width: fit-content;
}

table {
    border-collapse: collapse;
    margin: auto;
}

td {
    width: 38px;
    height: 38px;
    border: 1px solid #ccc;
}

input {
    width: 36px;
    height: 36px;
    text-align: center;
    font-size: 18px;
    border: none;
}

/* ===== GOMBOK ===== */
.top-buttons,
.bottom-buttons {
    margin: 15px;
}

button {
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
}

/* mobil */
@media (max-width: 600px) {
    input { width: 30px; height: 30px; }
    td { width: 32px; height: 32px; }
}
</style>
</head>

<body>

<h1>Sudoku Verseny</h1>

<div id="timer">⏱ 00:00</div>

<div class="section">
    <input id="name" placeholder="Név">
    <input id="className" placeholder="Osztály">
</div>

<!-- FELÜL: INDÍTÁS -->
<div class="top-buttons">
    <button onclick="startGame()">Verseny indítása</button>
</div>

<div id="puzzles"></div>

<!-- ALUL: BEKÜLDÉS -->
<div class="bottom-buttons">
    <button onclick="checkAll()">Beküldés</button>
</div>

<h2 id="result"></h2>

<script src="sudoku.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyBDcvw4MQww65S...",
    authDomain: "sudoku-verseny.firebaseapp.com",
    projectId: "sudoku-verseny"
});

window.db = firebase.firestore();
</script>

<script src="script.js"></script>

</body>
</html>
